<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#faf6f3">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>生活记录 · 主体性运动员</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#faf6f3; --card:#ffffff; --ink:#3d3a38; --ink2:#8a817c; --line:#f0e8e3;
  --rose:#e8657e; --rose-soft:#fdeef1;
  --green:#43a684; --green-soft:#e9f6f1;
  --orange:#e8923c; --orange-soft:#fdf2e6;
  --brown:#a9794e; --brown-soft:#f5ede5;
  --blue:#5b8def; --blue-soft:#ecf2fe;
  --pink:#d977c9; --pink-soft:#fbeef9;
  --purple:#9b6fd1; --purple-soft:#f3edfb;
  --red:#e05d5d;
  --radius:18px;
  --shadow:0 2px 10px rgba(150,120,110,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,"HarmonyOS Sans SC","MiSans","PingFang SC","Microsoft YaHei",sans-serif;
  font-size:16px;}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}

header{position:sticky;top:0;z-index:20;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);
  padding:calc(env(safe-area-inset-top) + 14px) 18px 10px;display:flex;align-items:center;justify-content:space-between}
header h1{margin:0;font-size:19px;font-weight:800;letter-spacing:.5px}
header h1 small{display:block;font-size:11px;font-weight:500;color:var(--ink2);letter-spacing:2px;margin-top:2px}
#btn-settings{font-size:20px;padding:6px;border-radius:50%}

main{padding:4px 14px calc(env(safe-area-inset-bottom) + 86px);max-width:560px;margin:0 auto}
section.view{display:none}
section.view.active{display:block;animation:fadein .18s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.card h3{margin:0 0 12px;font-size:14px;color:var(--ink2);font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:6px}

/* ===== tab bar ===== */
#tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;background:rgba(255,255,255,.95);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
#tabbar button{flex:1;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:11px;color:var(--ink2);font-weight:600}
#tabbar button .ti{font-size:22px;line-height:1;filter:grayscale(1);opacity:.55;transition:.15s}
#tabbar button.active{color:var(--rose)}
#tabbar button.active .ti{filter:none;opacity:1;transform:translateY(-2px) scale(1.08)}

/* ===== log view ===== */
.datebar{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 12px}
.datebar .dnav{font-size:22px;color:var(--ink2);padding:4px 14px;border-radius:12px}
.datebar .dmid{text-align:center}
.datebar .dmid b{font-size:17px}
.datebar .dmid span{display:block;font-size:12px;color:var(--ink2);margin-top:1px}
.btn-today{font-size:12px;color:var(--rose);background:var(--rose-soft);border-radius:99px;padding:3px 10px;margin-top:4px;display:none}
.btn-today.show{display:inline-block}

.quickbox{display:flex;gap:8px}
.quickbox input{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;background:#fffdfb;outline:none}
.quickbox input:focus{border-color:var(--rose)}
.quickbox button{background:var(--rose);color:#fff;border-radius:12px;padding:0 16px;font-weight:700;font-size:14px}
.quickhint{font-size:11px;color:var(--ink2);margin:8px 2px 0;line-height:1.6}

.period-toggle{display:flex;align-items:center;justify-content:space-between}
.period-toggle .pt-label{font-size:16px;font-weight:700}
.switch{width:52px;height:30px;border-radius:99px;background:#e9e2dd;position:relative;transition:.2s;flex:none}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;
  box-shadow:0 1px 4px rgba(0,0,0,.2);transition:.2s}
.switch.on{background:var(--rose)}
.switch.on::after{left:25px}
.painrow{display:none;margin-top:14px;border-top:1px dashed var(--line);padding-top:12px}
.painrow.show{display:block}
.painrow p{margin:0 0 8px;font-size:13px;color:var(--ink2)}
.pains{display:flex;gap:8px}
.pains button{flex:1;font-size:24px;padding:8px 0;border-radius:12px;background:#faf6f3;opacity:.45;transition:.15s}
.pains button.sel{opacity:1;background:var(--rose-soft);transform:scale(1.1)}
.pains button small{display:block;font-size:10px;color:var(--ink2);margin-top:2px}

.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.counter{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 12px 10px;text-align:center}
.counter .ce{font-size:26px}
.counter .cl{font-size:12px;color:var(--ink2);margin:2px 0 6px;font-weight:600}
.counter .crow{display:flex;align-items:center;justify-content:center;gap:8px}
.counter .crow button{width:38px;height:38px;border-radius:12px;font-size:20px;font-weight:700;background:#faf6f3;color:var(--ink2)}
.counter .crow button.plus{color:#fff}
.counter .cv{font-size:22px;font-weight:800;min-width:30px}

.wo-chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none}
.wo-chips::-webkit-scrollbar{display:none}
.chip{flex:none;padding:7px 13px;border-radius:99px;background:#faf6f3;font-size:13px;font-weight:600;color:var(--ink2);border:1.5px solid transparent}
.chip.sel{background:var(--blue-soft);color:var(--blue);border-color:var(--blue)}
.chip.sel-rose{background:var(--rose-soft);color:var(--rose);border-color:var(--rose)}
.wo-add{display:flex;gap:8px;align-items:center;margin-top:4px}
.wo-add input{width:80px;border:1.5px solid var(--line);border-radius:12px;padding:9px 10px;text-align:center;background:#fffdfb;outline:none}
.wo-add span{font-size:13px;color:var(--ink2)}
.wo-add button{margin-left:auto;background:var(--blue);color:#fff;border-radius:12px;padding:9px 18px;font-weight:700;font-size:14px}
.wo-list{margin-top:10px}
.wo-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:12px;background:var(--blue-soft);margin-top:6px;font-size:14px}
.wo-item b{font-weight:700}
.wo-item .del{margin-left:auto;color:var(--ink2);font-size:16px;padding:2px 6px}

textarea#note{width:100%;border:1.5px solid var(--line);border-radius:12px;background:#fffdfb;padding:10px 12px;
  min-height:64px;resize:vertical;outline:none;font-size:14px;line-height:1.6}
textarea#note:focus{border-color:var(--rose)}

/* ===== calendar ===== */
.calhead{display:flex;align-items:center;justify-content:space-between;margin:8px 2px 10px}
.calhead b{font-size:17px}
.calhead button{font-size:20px;color:var(--ink2);padding:4px 16px;border-radius:12px}
.weekrow{display:grid;grid-template-columns:repeat(7,1fr);font-size:11px;color:var(--ink2);text-align:center;margin-bottom:4px;font-weight:600}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cell{aspect-ratio:.68;border-radius:12px;background:var(--card);box-shadow:var(--shadow);padding:4px 1px 3px;
  display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;overflow:hidden}
.cell.empty{background:transparent;box-shadow:none}
.cell .dn{font-size:13px;font-weight:700;line-height:1.3}
.cell.dim .dn{color:#c9beb8}
.cell.period{background:var(--rose-soft)}
.cell.predict{background:repeating-linear-gradient(135deg,#fff,#fff 4px,var(--rose-soft) 4px,var(--rose-soft) 8px)}
.cell.today{outline:2px solid var(--rose);outline-offset:-2px}
.cell.sel{outline:2.5px solid var(--blue);outline-offset:-2.5px}
.emos{display:flex;flex-wrap:wrap;justify-content:center;gap:1px 1px;font-size:11px;line-height:1.2;padding:0 1px;max-width:100%}
.legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:12px;padding:0 4px}
.legend span{font-size:11.5px;color:var(--ink2);display:flex;align-items:center;gap:5px}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
.daydetail{margin-top:12px}
.daydetail .dd-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.daydetail .dd-head b{font-size:15px}
.daydetail .dd-edit{background:var(--blue-soft);color:var(--blue);border-radius:99px;padding:6px 14px;font-size:13px;font-weight:700}
.daydetail .dd-line{display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px dashed var(--line);font-size:14.5px}
.daydetail .dd-line:last-child{border-bottom:none}
.daydetail .dd-line .de{font-size:17px;flex:none}
.daydetail .dd-empty{color:var(--ink2);font-size:13px;padding:6px 2px}

/* ===== stats ===== */
.bignum{display:flex;justify-content:space-around;text-align:center;margin:4px 0 2px}
.bignum .bn b{font-size:26px;font-weight:800;display:block}
.bignum .bn span{font-size:12px;color:var(--ink2)}
.statrow{display:flex;justify-content:space-between;align-items:baseline;padding:7px 2px;border-bottom:1px dashed var(--line);font-size:14px}
.statrow:last-child{border-bottom:none}
.statrow b{font-size:16px}
.statrow .muted{color:var(--ink2);font-size:13px}
.bar-item{margin-top:10px}
.bar-item .bi-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bar-item .bi-top b{font-weight:700}
.bar-item .bi-track{height:10px;border-radius:99px;background:#f5efe9;overflow:hidden}
.bar-item .bi-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#7ba5f5,var(--blue))}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{border-radius:14px;padding:14px 12px;text-align:center}
.tile b{display:block;font-size:21px;font-weight:800;margin-bottom:2px}
.tile span{font-size:11.5px;color:var(--ink2)}
.empty-tip{color:var(--ink2);font-size:13px;text-align:center;padding:10px 0;line-height:1.7}

/* ===== todo ===== */
.todo-add{margin-bottom:12px}
.todo-add .ta-row1{display:flex;gap:8px}
.todo-add input[type=text]{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;background:#fffdfb;outline:none}
.todo-add input[type=text]:focus{border-color:var(--rose)}
.todo-add .ta-btn{background:var(--rose);color:#fff;border-radius:12px;padding:0 18px;font-weight:700;font-size:14px}
.emoji-row{display:flex;gap:6px;overflow-x:auto;padding:10px 0 2px;scrollbar-width:none}
.emoji-row::-webkit-scrollbar{display:none}
.emoji-row button{flex:none;font-size:19px;width:38px;height:38px;border-radius:12px;background:#faf6f3;opacity:.5}
.emoji-row button.sel{opacity:1;background:var(--rose-soft);transform:scale(1.1)}
.ta-due{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:13px;color:var(--ink2)}
.ta-due input{border:1.5px solid var(--line);border-radius:10px;padding:6px 8px;background:#fffdfb}
.todo-item{display:flex;align-items:center;gap:11px;background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:13px 14px;margin-bottom:9px}
.todo-item .tcheck{width:26px;height:26px;border-radius:50%;border:2px solid #ddd2cb;flex:none;font-size:15px;
  display:flex;align-items:center;justify-content:center;color:#fff;transition:.15s}
.todo-item.done .tcheck{background:var(--green);border-color:var(--green)}
.todo-item .temoji{font-size:21px;flex:none}
.todo-item .tbody{flex:1;min-width:0}
.todo-item .ttitle{font-size:15px;font-weight:600;line-height:1.4;word-break:break-all}
.todo-item.done .ttitle{text-decoration:line-through;color:var(--ink2)}
.todo-item .tmeta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:700}
.badge.b-green{background:var(--green-soft);color:var(--green)}
.badge.b-orange{background:var(--orange-soft);color:var(--orange)}
.badge.b-red{background:#fdeaea;color:var(--red)}
.badge.b-blue{background:var(--blue-soft);color:var(--blue)}
.badge.b-gray{background:#f3eeea;color:var(--ink2);font-weight:600}
.todo-item .tdel{color:#cfc4bd;font-size:17px;padding:4px 6px;flex:none}
.done-toggle{width:100%;text-align:center;color:var(--ink2);font-size:13px;padding:8px;font-weight:600}

/* ===== modal / toast ===== */
#overlay{position:fixed;inset:0;background:rgba(60,45,40,.35);z-index:40;display:none;align-items:flex-end;justify-content:center}
#overlay.show{display:flex}
.sheet{background:var(--bg);border-radius:22px 22px 0 0;width:100%;max-width:560px;padding:20px 18px calc(env(safe-area-inset-bottom) + 24px);
  animation:slideup .22s ease}
@keyframes slideup{from{transform:translateY(40%)}to{transform:none}}
.sheet h2{margin:0 0 16px;font-size:17px}
.sheet .srow{display:flex;gap:10px;margin-bottom:10px}
.sheet .srow button{flex:1;padding:13px;border-radius:14px;background:var(--card);box-shadow:var(--shadow);font-size:14px;font-weight:600}
.sheet .danger{color:var(--red)}
.sheet p.note{font-size:12px;color:var(--ink2);line-height:1.7;margin:14px 2px 0}
#toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);background:rgba(61,58,56,.92);
  color:#fff;font-size:13px;padding:9px 18px;border-radius:99px;opacity:0;pointer-events:none;transition:.25s;z-index:60;
  max-width:80vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%)}
</style>
</head>
<body>

<header>
  <h1>生活记录<small>主 体 性 运 动 员</small></h1>
  <button id="btn-settings" title="设置">⚙️</button>
</header>

<main>
  <!-- ============ 记一笔 ============ -->
  <section class="view active" id="view-log">
    <div class="datebar">
      <button class="dnav" id="d-prev">‹</button>
      <div class="dmid">
        <b id="d-label"></b>
        <span id="d-week"></span>
        <button class="btn-today" id="d-today">回到今天</button>
      </div>
      <button class="dnav" id="d-next">›</button>
    </div>

    <div class="card">
      <h3>⚡ 快记一句</h3>
      <div class="quickbox">
        <input id="quick-input" placeholder="如：奶茶1 跑步40分钟 姨妈 难受3">
        <button id="quick-go">记</button>
      </div>
      <div class="quickhint">能识别：奶茶/大餐/健康餐/小快乐/社交 + 数量、姨妈、难受1~5、长痘、早睡、运动名 + 时长（分钟或小时）</div>
    </div>

    <div class="card">
      <div class="period-toggle">
        <div class="pt-label">🩸 今天是姨妈日</div>
        <div class="switch" id="sw-period"></div>
      </div>
      <div class="painrow" id="painrow">
        <p>今天难受程度？</p>
        <div class="pains" id="pains"></div>
      </div>
    </div>

    <div class="cgrid" id="counters"></div>

    <div class="card" style="margin-top:12px">
      <h3>🏃‍♀️ 今天运动了吗</h3>
      <div class="wo-chips" id="wo-types"></div>
      <div class="wo-chips" id="wo-durs"></div>
      <div class="wo-add">
        <input id="wo-min" type="number" inputmode="numeric" placeholder="自定义">
        <span>分钟</span>
        <button id="wo-add-btn">＋ 添加</button>
      </div>
      <div class="wo-list" id="wo-list"></div>
    </div>

    <div class="card">
      <h3>📝 今日备注</h3>
      <textarea id="note" placeholder="随便写点什么……"></textarea>
    </div>
  </section>

  <!-- ============ 日历 ============ -->
  <section class="view" id="view-cal">
    <div class="calhead">
      <button id="cal-prev">‹</button>
      <b id="cal-label"></b>
      <button id="cal-next">›</button>
    </div>
    <div class="weekrow"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
    <div class="calgrid" id="calgrid"></div>
    <div class="legend" id="legend"></div>
    <div class="card daydetail" id="daydetail"></div>
  </section>

  <!-- ============ 统计 ============ -->
  <section class="view" id="view-stats">
    <div class="calhead">
      <button id="st-prev">‹</button>
      <b id="st-label"></b>
      <button id="st-next">›</button>
    </div>
    <div id="stats-body"></div>
  </section>

  <!-- ============ 待办 ============ -->
  <section class="view" id="view-todo">
    <div class="card todo-add">
      <div class="ta-row1">
        <input type="text" id="todo-text" placeholder="又有什么事要办啦…">
        <button class="ta-btn" id="todo-add-btn">＋</button>
      </div>
      <div class="emoji-row" id="todo-emojis"></div>
      <div class="ta-due">
        <span>截止日期（可不填）</span>
        <input type="date" id="todo-due">
      </div>
    </div>
    <div id="todo-list"></div>
    <button class="done-toggle" id="done-toggle" style="display:none"></button>
    <div id="todo-done-list" style="display:none"></div>
  </section>
</main>

<nav id="tabbar">
  <button data-view="log" class="active"><span class="ti">✏️</span>记一笔</button>
  <button data-view="cal"><span class="ti">📅</span>日历</button>
  <button data-view="stats"><span class="ti">📊</span>统计</button>
  <button data-view="todo"><span class="ti">📌</span>待办</button>
</nav>

<div id="overlay">
  <div class="sheet">
    <h2>⚙️ 设置与数据</h2>
    <div class="srow">
      <button id="btn-export">📤 导出备份</button>
      <button id="btn-import">📥 导入备份</button>
    </div>
    <div class="srow">
      <button class="danger" id="btn-wipe">🗑️ 清空全部数据</button>
      <button id="btn-close-sheet">关闭</button>
    </div>
    <input type="file" id="file-import" accept=".json" style="display:none">
    <p class="note">所有数据只保存在这台手机本地，不会上传到任何服务器。换手机或清浏览器数据前，记得先「导出备份」，新设备上再「导入备份」。</p>
  </div>
</div>

<div id="toast"></div>

<script>
"use strict";
/* ================= 数据 ================= */
const LS = "lifelog.v1";
const CATS = {
  milktea : {emoji:"🧋", label:"奶茶",     color:"var(--brown)",  raw:"#a9794e", unit:"杯"},
  feast   : {emoji:"🍖", label:"大鱼大肉", color:"var(--orange)", raw:"#e8923c", unit:"顿"},
  healthy : {emoji:"🥗", label:"健康餐",   color:"var(--green)",  raw:"#43a684", unit:"顿"},
  selfcare: {emoji:"💗", label:"小快乐",   color:"var(--pink)",   raw:"#d977c9", unit:"次"},
  social  : {emoji:"🎉", label:"社交活动", color:"#3aa8c4",       raw:"#3aa8c4", unit:"次"},
};
const PAINS = [["😌","还好"],["😕","有点"],["😣","难受"],["😖","很难受"],["😭","要命"]];
const WO_TYPES = ["跑步","健身房","健身课","瑜伽","游泳","骑行","爬山","羽毛球","跳舞","散步","其他"];
const WO_EMOJI = {跑步:"🏃‍♀️",健身房:"🏋️‍♀️",健身课:"🤸‍♀️",瑜伽:"🧘‍♀️",游泳:"🏊‍♀️",骑行:"🚴‍♀️",爬山:"⛰️",羽毛球:"🏸",跳舞:"💃",散步:"🚶‍♀️",其他:"✨"};
const WO_DURS = [15,30,45,60,90,120];
const TODO_EMOJIS = ["📄","🏛️","🪑","🪟","✈️","🐱","🛒","🏠","💊","💼","📞","✨"];

let S = load();
function load(){
  try{
    const raw = localStorage.getItem(LS);
    if(raw){ const d = JSON.parse(raw); if(d && d.days && d.todos) return d; }
  }catch(e){}

function blankDay(){ return {period:false,pain:0,healthy:0,feast:0,milktea:0,selfcare:0,social:0,acne:false,sleep:false,workouts:[],note:""}; }
function day(k){ if(!S.days[k]) S.days[k] = blankDay(); return S.days[k]; }
function dayOrNull(k){ return S.days[k] || null; }
function hasData(d){
  return d && (d.period || d.acne || d.sleep || d.healthy>0 || d.feast>0 || d.milktea>0 || d.selfcare>0 || d.social>0 ||
    (d.workouts && d.workouts.length>0) || (d.note && d.note.trim()));

/* ================= 日期工具 ================= */
function fmtDate(d){ return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function parseDate(k){ const [y,m,dd] = k.split("-").map(Number); return new Date(y, m-1, dd); }
function addDays(k,n){ const d = parseDate(k); d.setDate(d.getDate()+n); return fmtDate(d); }
function diffDays(a,b){ return Math.round((parseDate(b) - parseDate(a)) / 86400000); }
function todayKey(){ return fmtDate(new Date()); }
const WEEKS = ["日","一","二","三","四","五","六"];
function prettyDate(k){ const d = parseDate(k); return (d.getMonth()+1) + "月" + d.getDate() + "日"; }
function fmtMins(m){
  if(m >= 60){ const h = Math.floor(m/60), r = m%60; return r ? h+" 小时 "+r+" 分" : h+" 小时"; }
  return m + " 分钟";
}

/* ====== 快记解析 ====== */
function quickParse(text){
  const d = day(curDate);
  const got = [];
  let s = text;

  // 运动：运动名 + 数字 + 单位
  const woRe = /(跑步|健身课|健身房|健身|瑜伽|游泳|骑行|爬山|羽毛球|跳舞|散步)\s*(\d+(?:\.\d+)?)\s*(小时|h|H|分钟|分|min)?/g;
  let m;
  while((m = woRe.exec(s)) !== null){
    let type = m[1] === "健身" ? "健身房" : m[1];
    let n = parseFloat(m[2]);
    const unit = m[3] || "分钟";
    const mins = /小时|h|H/.test(unit) ? Math.round(n*60) : Math.round(n);
    if(mins > 0){
      d.workouts = d.workouts || [];
      d.workouts.push({type, mins});
      got.push(type + " " + fmtMins(mins));
    }
  }
  s = s.replace(woRe, " ");

  // 难受程度
  const pm = s.match(/难受\s*([1-5])/);
  if(pm){ d.pain = +pm[1]; d.period = true; got.push("难受"+pm[1]); s = s.replace(pm[0]," "); }

  // 姨妈
  if(/姨妈|月经|大姨妈/.test(s)){ d.period = true; got.push("姨妈日"); }
  // 长痘
  if(/长痘|爆痘|痘痘/.test(s)){ d.acne = true; got.push("长痘"); }
  // 11点前睡觉
  if(/早睡|11点前睡|十一点前睡/.test(s)){ d.sleep = true; got.push("11点前睡觉🌙"); }

  // 计数类
  const cntRe = {milktea:/(奶茶|咖啡奶茶)\s*[x×*]?\s*(\d*)/, feast:/(大餐|大鱼大肉|火锅|烧烤|聚餐)\s*[x×*]?\s*(\d*)/, healthy:/(健康餐|轻食|沙拉)\s*[x×*]?\s*(\d*)/, selfcare:/(小快乐|自摸)\s*[x×*]?\s*(\d*)/, social:/(社交|聚会|约会|派对)\s*[x×*]?\s*(\d*)/};
  for(const [key,re] of Object.entries(cntRe)){
    const mm = s.match(re);
    if(mm){
      const n = mm[2] ? parseInt(mm[2],10) : 1;
      d[key] = (d[key]||0) + n;
      got.push(CATS[key].label + " +" + n);
    }
  }
  cleanup(curDate);
  return got;
}

/* ================= 经期统计 ================= */
function periodStats(){
  const dates = Object.keys(S.days).filter(k=> S.days[k].period).sort();
  if(!dates.length) return null;
  const runs = []; let run = [dates[0]];
  for(let i=1;i<dates.length;i++){
    if(diffDays(dates[i-1], dates[i]) === 1) run.push(dates[i]);
    else { runs.push(run); run = [dates[i]]; }
  }
  runs.push(run);
  const starts = runs.map(r=> r[0]);
  const lens   = runs.map(r=> r.length);
  const cycles = [];
  for(let i=1;i<starts.length;i++){
    const d = diffDays(starts[i-1], starts[i]);
    if(d >= 15 && d <= 90) cycles.push(d);     // 过滤异常间隔
  }
  const avgCycle = cycles.length ? Math.round(cycles.reduce((a,b)=>a+b,0)/cycles.length) : null;
  const avgLen   = Math.max(1, Math.round(lens.reduce((a,b)=>a+b,0)/lens.length));
  const lastStart = starts[starts.length-1];
  const next = avgCycle ? addDays(lastStart, avgCycle) : null;
  return {avgCycle, avgLen, lastStart, next, count:runs.length};
}

function agg(prefix){
  const a = {milktea:0,feast:0,healthy:0,selfcare:0,social:0,acneDays:0,sleepDays:0,periodDays:0,painSum:0,painN:0,
             wMins:0,wCount:0,wDays:0,byType:{},recDays:0};
  for(const [k,d] of Object.entries(S.days)){
    if(prefix && !k.startsWith(prefix)) continue;
    if(!hasData(d)) continue;
    a.recDays++;
    a.milktea += d.milktea||0; a.feast += d.feast||0; a.healthy += d.healthy||0; a.selfcare += d.selfcare||0; a.social += d.social||0;
    if(d.acne) a.acneDays++;
    if(d.sleep) a.sleepDays++;
    if(d.period){ a.periodDays++; if(d.pain){ a.painSum += d.pain; a.painN++; } }
    if(d.workouts && d.workouts.length){
      a.wDays++;
      for(const w of d.workouts){ a.wMins += w.mins; a.wCount++; a.byType[w.type] = (a.byType[w.type]||0) + w.mins; }
    }
  }
  return a;
}

    </div>`;
  if(M.healthy + M.feast > 0){
    const pct = Math.round(100 * M.healthy / (M.healthy + M.feast));
    html += `<div class="bar-item"><div class="bi-top"><span>健康饮食占比</span><b style="color:var(--green)">${pct}%</b></div>
      <div class="bi-track"><div class="bi-fill" style="width:${pct}%;background:linear-gradient(90deg,#6cc3a5,var(--green))"></div></div></div>`;
  }
  html += `</div>`;

  // 本月运动
  html += `<div class="card"><h3>🏃‍♀️ 本月运动</h3>`;
  if(M.wCount === 0){
    html += `<div class="empty-tip">这个月还没动过哦，主体性运动员！💪</div>`;
  }else{
    html += `<div class="bignum">
      <div class="bn"><b style="color:var(--blue)">${(M.wMins/60).toFixed(1)}</b><span>总时长（小时）</span></div>
      <div class="bn"><b>${M.wCount}</b><span>总次数</span></div>
      <div class="bn"><b>${M.wDays}</b><span>运动天数</span></div>
    </div>`;
    const maxMins = Math.max(...Object.values(M.byType));
    const sorted = Object.entries(M.byType).sort((a,b)=> b[1]-a[1]);
    for(const [t,mins] of sorted){
      html += `<div class="bar-item"><div class="bi-top"><span>${WO_EMOJI[t]||"✨"} ${t}</span><b>${fmtMins(mins)}</b></div>
        <div class="bi-track"><div class="bi-fill" style="width:${Math.max(6, Math.round(100*mins/maxMins))}%"></div></div></div>`;
    }
  }
  html += `</div>`;

  // 本月生活
  html += `<div class="card"><h3>🌸 本月生活小账</h3>
    <div class="bignum">
      <div class="bn"><b style="color:var(--purple)">${M.acneDays}</b><span>🌋 长痘（天）</span></div>
      <div class="bn"><b style="color:var(--pink)">${M.selfcare}</b><span>💗 小快乐（次）</span></div>
      <div class="bn"><b style="color:var(--rose)">${M.periodDays}</b><span>🩸 姨妈（天）</span></div>
    </div>
    <div class="bignum" style="margin-top:14px">
      <div class="bn"><b style="color:#e3b53a">${M.sleepDays}</b><span>🌙 11点前睡（天）</span></div>
      <div class="bn"><b style="color:#3aa8c4">${M.social}</b><span>🎉 社交活动（次）</span></div>
    </div></div>`;

  // 累计成就
  const favType = Object.entries(A.byType).sort((a,b)=> b[1]-a[1])[0];
  html += `<div class="card"><h3>🏆 累计成就（全部历史）</h3>
    <div class="tiles">
      <div class="tile" style="background:var(--blue-soft)"><b style="color:var(--blue)">${(A.wMins/60).toFixed(1)} 小时</b><span>累计运动时长</span></div>
      <div class="tile" style="background:var(--blue-soft)"><b style="color:var(--blue)">${A.wCount} 次</b><span>累计运动次数</span></div>
      <div class="tile" style="background:var(--green-soft)"><b style="color:var(--green)">${A.recDays} 天</b><span>累计记录天数</span></div>
      <div class="tile" style="background:var(--rose-soft)"><b style="color:var(--rose)">${favType ? (WO_EMOJI[favType[0]]||"") + " " + favType[0] : "—"}</b><span>最爱的运动</span></div>
      <div class="tile" style="background:var(--brown-soft)"><b style="color:var(--brown)">${A.milktea} 杯</b><span>累计奶茶</span></div>
      <div class="tile" style="background:var(--orange-soft)"><b style="color:var(--orange)">${A.feast} 顿</b><span>累计大餐</span></div>
      <div class="tile" style="background:var(--green-soft)"><b style="color:var(--green)">${A.healthy} 顿</b><span>累计健康餐</span></div>
      <div class="tile" style="background:var(--rose-soft)"><b style="color:var(--rose)">${ps ? ps.count : 0} 次</b><span>记录的经期次数</span></div>
      <div class="tile" style="background:#faf3df"><b style="color:#c79a1e">${A.sleepDays} 天</b><span>累计 11 点前睡</span></div>
      <div class="tile" style="background:#e7f4f8"><b style="color:#3aa8c4">${A.social} 次</b><span>累计社交活动</span></div>
    </div></div>`;

  body.innerHTML = html;
}

/* ================= 待办 ================= */
function renderTodoEmojis(){
  const w = document.getElementById("todo-emojis");
  w.innerHTML = "";
  TODO_EMOJIS.forEach(e=>{
    const b = document.createElement("button");
    b.textContent = e;
    if(e === todoEmoji) b.classList.add("sel");
    b.onclick = ()=>{ todoEmoji = e; renderTodoEmojis(); };
    w.appendChild(b);
  });
}
document.getElementById("todo-add-btn").onclick = ()=>{
  const inp = document.getElementById("todo-text");
  const t = inp.value.trim();
  if(!t){ toast("先写点要办的事呀"); return; }
  const due = document.getElementById("todo-due").value || null;
  S.todos.unshift({id:uid(), emoji:todoEmoji, title:t, createdAt:todayKey(), due, done:false, doneAt:null});
  inp.value = ""; document.getElementById("todo-due").value = "";
  save(); renderTodos();
  toast("已记下 ✓ 不许再拖啦");
};
document.getElementById("todo-text").addEventListener("keydown", e=>{
  if(e.key === "Enter") document.getElementById("todo-add-btn").click();
});

function pendBadge(days){
  const cls = days >= 30 ? "b-red" : days >= 7 ? "b-orange" : "b-green";
  return `<span class="badge ${cls}">已搁置 ${days} 天</span>`;
}
function renderTodos(){
  renderTodoEmojis();
  const tk = todayKey();
  const open = S.todos.filter(t=> !t.done).sort((a,b)=> diffDays(b.createdAt,tk) - diffDays(a.createdAt,tk)).reverse();
  // 想要搁置最久的排最上面：
  open.sort((a,b)=> diffDays(a.createdAt,tk) < diffDays(b.createdAt,tk) ? 1 : -1);
  const done = S.todos.filter(t=> t.done).sort((a,b)=> (b.doneAt||"").localeCompare(a.doneAt||""));

  const list = document.getElementById("todo-list");
  list.innerHTML = "";
  if(!open.length){
    list.innerHTML = `<div class="empty-tip" style="padding:30px 0">🎉 太棒了，没有待办的事！</div>`;
  }
  open.forEach(t=> list.appendChild(todoEl(t, tk)));

  const tog = document.getElementById("done-toggle");
  const dl  = document.getElementById("todo-done-list");
  if(done.length){
    tog.style.display = "block";
    tog.textContent = (showDone ? "收起" : "查看") + "已完成（" + done.length + "）" + (showDone ? " ▲" : " ▼");
    dl.style.display = showDone ? "block" : "none";
    dl.innerHTML = "";
    if(showDone) done.forEach(t=> dl.appendChild(todoEl(t, tk)));
  }else{
    tog.style.display = "none"; dl.style.display = "none";
  }
}
document.getElementById("done-toggle").onclick = ()=>{ showDone = !showDone; renderTodos(); };

function todoEl(t, tk){
  const el = document.createElement("div");
  el.className = "todo-item" + (t.done ? " done" : "");
  let meta = "";
  if(t.done){
    const took = Math.max(0, diffDays(t.createdAt, t.doneAt || tk));
    meta = `<span class="badge b-gray">✓ ${prettyDate(t.doneAt || tk)} 完成 · 历时 ${took} 天</span>`;
  }else{
    meta = pendBadge(Math.max(0, diffDays(t.createdAt, tk)));
    if(t.due){
      const left = diffDays(tk, t.due);
      meta += left >= 0
        ? `<span class="badge b-blue">⏳ 还剩 ${left} 天</span>`
        : `<span class="badge b-red">⚠ 已超期 ${-left} 天</span>`;
    }
  }
  el.innerHTML = `<button class="tcheck">${t.done ? "✓" : ""}</button>
    <span class="temoji">${t.emoji}</span>
    <div class="tbody"><div class="ttitle">${escapeHtml(t.title)}</div><div class="tmeta">${meta}</div></div>
    <button class="tdel">✕</button>`;
  el.querySelector(".tcheck").onclick = ()=>{
    t.done = !t.done;
    t.doneAt = t.done ? todayKey() : null;
    save(); renderTodos();
    if(t.done) toast("🎉 搞定一件大事！");
  };
  el.querySelector(".tdel").onclick = ()=>{
    if(confirm("删除「" + t.title + "」？")){
      S.todos = S.todos.filter(x=> x.id !== t.id);
      save(); renderTodos();
    }
  };
  return el;
}
function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ================= 设置 ================= */
const overlay = document.getElementById("overlay");
document.getElementById("btn-settings").onclick = ()=> overlay.classList.add("show");
document.getElementById("btn-close-sheet").onclick = ()=> overlay.classList.remove("show");
overlay.addEventListener("click", e=>{ if(e.target === overlay) overlay.classList.remove("show"); });

document.getElementById("btn-export").onclick = ()=>{
  // APK 内通过安卓桥接写入「下载」文件夹；浏览器里走普通下载
  if(window.AndroidBridge && window.AndroidBridge.saveBackup){
    window.AndroidBridge.saveBackup(JSON.stringify(S, null, 2), "生活记录备份-" + todayKey() + ".json");
    return;
  }
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "生活记录备份-" + todayKey() + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
  toast("已导出备份文件 📤");
};
document.getElementById("btn-import").onclick = ()=> document.getElementById("file-import").click();
document.getElementById("file-import").addEventListener("change", e=>{
  const f = e.target.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const d = JSON.parse(r.result);
      if(!d || !d.days || !d.todos) throw new Error("bad");
      if(confirm("导入会覆盖当前手机上的数据，确定吗？")){
        S = d; save();
        renderLog(); renderTodos();
        overlay.classList.remove("show");
        toast("导入成功 ✓");
      }
    }catch(err){ toast("文件格式不对，导入失败"); }
    e.target.value = "";
  };
  r.readAsText(f);
});
document.getElementById("btn-wipe").onclick = ()=>{
  if(confirm("真的要清空全部数据吗？此操作不可恢复！") && confirm("再确认一次：所有记录和待办都会被删掉！")){
    localStorage.removeItem(LS);
    S = load(); save();
    renderLog(); renderTodos();
    overlay.classList.remove("show");
    toast("已清空");
  }
};

/* ================= 启动 ================= */
renderLog();
renderTodos();
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
